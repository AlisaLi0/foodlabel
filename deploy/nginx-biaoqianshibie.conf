# biaoqianshibie — 加到 docs-tools.online 的 HTTPS server 块里（443 那个 server{}）。
#
# 站点挂在子路径 /biaoqianshibie/，由 HTTP Basic Auth 加锁（用户 admin）。
# 后端 FastAPI 在 127.0.0.1:8610 同源提供前端 + /api/*。
#
# 一、先创建口令文件（用户 admin，口令见交接说明）：
#   apt-get install -y apache2-utils   # 提供 htpasswd（若缺）
#   htpasswd -cbB /etc/nginx/.htpasswd-biaoqianshibie admin '在此填口令'
#   # 若无 apache2-utils，可用：
#   #   echo "admin:$(openssl passwd -apr1 '在此填口令')" > /etc/nginx/.htpasswd-biaoqianshibie
#   chmod 640 /etc/nginx/.htpasswd-biaoqianshibie
#   chown root:www-data /etc/nginx/.htpasswd-biaoqianshibie
#
# 二、把下面整段粘进 docs-tools.online 的 `listen 443` server{} 内，
#     放在 `location / { return 404; }` 之前（前缀匹配 ^~ 优先级已足够）。
# 三、nginx -t && systemctl reload nginx

# 无斜杠访问 → 跳到带斜杠，保证 <base href> 与相对路径正确解析
location = /biaoqianshibie { return 301 https://$host/biaoqianshibie/; }

location ^~ /biaoqianshibie/ {
    auth_basic "biaoqianshibie";
    auth_basic_user_file /etc/nginx/.htpasswd-biaoqianshibie;

    # 去掉 /biaoqianshibie/ 前缀转发到后端（trailing slash）
    proxy_pass http://127.0.0.1:8610/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # 上传图片：放宽请求体与超时（视觉推理可能数十秒）
    client_max_body_size 40m;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_buffering off;
}
