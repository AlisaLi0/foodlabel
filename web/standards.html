    /* 文档站布局：左侧导航 + 右侧单篇内容 */
    .docs-layout { max-width: 1160px; margin: 0 auto; display: flex; gap: 24px; padding: 22px 16px 56px; align-items: flex-start; box-sizing: border-box; }
    .docs-nav { width: 248px; flex: none; position: sticky; top: 16px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow-sm); max-height: calc(100vh - 32px); overflow: auto; }

    .nav-back:hover { text-decoration: underline; }
    .nav-group-t { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .4px; margin: 14px 8px 6px; }
    .nav-item { display: block; padding: 9px 12px; border-radius: 9px; font-size: 14px; color: var(--ink); text-decoration: none; line-height: 1.4; transition: background .14s, color .14s; }
    .nav-item:hover { background: #eef3fb; }
    .nav-item.active { background: var(--brand); color: #fff; font-weight: 600; }
    .docs-content { flex: 1; min-width: 0; background: var(--card); border-radius: var(--radius); padding: 24px 26px; box-shadow: var(--shadow); }
    .doc-title { margin: 0 0 6px; font-size: 20px; }
    .doc-sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; line-height: 1.6; }
    .doc-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .doc-links a { font-size: 13px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line); color: var(--brand-d); text-decoration: none; background: #f5f8fd; }
    .doc-links a:hover { background: #e9f1fc; }
    .doc-links a.src { border-color: var(--brand); color: #fff; background: var(--brand); }
    .doc-links a.src:hover { background: var(--brand-d); }
    .src-note { color: var(--muted); font-size: 12px; margin: 6px 0 0; line-height: 1.6; }
    .doctext { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.9; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
    .doctext h3 { font-size: 15px; margin: 20px 0 8px; color: var(--brand-d); border-left: 3px solid var(--brand); padding-left: 8px; }
    .doctext .art { font-weight: 600; }
    .doctext .q { color: var(--muted); font-size: 13px; }
    .loading { color: var(--muted); font-size: 13px; padding: 12px 0; }
    .loading.err { color: var(--fail); }
    @media (max-width: 760px) {
      .docs-layout { flex-direction: column; }
      .docs-nav { width: 100%; position: static; max-height: none; }
