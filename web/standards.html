    .doc-links { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 8px; justify-content: center; }

    .doc-links a.src { border-color: var(--brand); color: #fff; background: var(--brand); }
    .doc-links a.src:hover { background: var(--brand-d); }

    .pdf-frame { width: 100%; height: calc(100vh - 220px); min-height: 560px; margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; background: #f5f6f8; }

    .doctext .doc-cover { text-align: center; margin: 4px 0 28px; padding-bottom: 22px; border-bottom: 1px solid var(--line); }
    .doctext .cv-line { font-size: 15px; line-height: 1.9; }
    .doctext .cv-num { font-size: 17px; letter-spacing: 1px; margin: 6px 0; }
    .doctext .cv-title { font-size: 23px; font-weight: 700; margin: 10px 0; letter-spacing: 2px; }
    .doctext .dh3 { font-size: 17px; font-weight: 700; margin: 26px 0 12px; color: var(--ink); }
    .doctext .dh4 { font-size: 15.5px; font-weight: 700; margin: 18px 0 8px; color: var(--ink); }
    .doctext .dp { margin: 0 0 13px; text-indent: 2em; text-align: justify; }
    .doctext .dul { margin: 4px 0 13px; padding: 0; list-style: none; }
    .doctext .dul li { position: relative; padding-left: 2em; margin: 7px 0; text-align: justify; }
    .doctext .dul li::before { content: "—"; position: absolute; left: .4em; color: var(--muted); }
    .doctext .dli2 { text-indent: 2em; margin: 7px 0; text-align: justify; }
    .doctext .dquote { margin: 0 0 11px; padding: 10px 14px; background: #f5f8fd; border-left: 3px solid var(--brand); color: var(--muted); font-size: 13.5px; line-height: 1.8; text-align: justify; }
    .doctext .art { font-weight: 700; color: var(--ink); }
